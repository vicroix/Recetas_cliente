<div th:fragment="editorProd">
	<div class="contenido-editor-prod">
		<form th:action="@{/EditarProdTicket}" method="post"
			th:object="${obj_ticket}" class="form-no-border">
			<div class="display-row">
				<h3 th:text=" 'Editor del ticket con id[' + *{id} + ']'"></h3>
			</div>
			<div class="display-column">
				<h4>Lista Productos</h4>
				<input type="hidden" name="id" th:value="*{id}">
				<div>
					<select name="id_prod">
						<option th:each="elem:${listaProductos}" th:value="${elem.id}"
							th:text="${elem.nombre}">
					</select>
				</div>
				<div class="display-column">
					<label>Cantidad:</label> <input type="number" name="cantidad_prod"
						min="1" required>
				</div>
			</div>
			<div>
				<button type="submit" title="Guardar" class="button-svg">
					<svg xmlns="http://www.w3.org/2000/svg" width="25" height="25"
						viewBox="0 0 48 48">
						<path fill="#D1C4E9"
							d="M38 7H10c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h28c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2m0 12H10c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h28c1.1 0 2-.9 2-2v-6c0-1.1-.9-2-2-2m0 12H10c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h28c1.1 0 2-.9 2-2v-6c0-1.1-.9-2-2-2" />
						<circle cx="38" cy="38" r="10" fill="#43A047" />
						<g fill="#fff">
						<path d="M36 32h4v12h-4z" />
						<path d="M32 36h12v4H32z" /></g>
					</svg>
				</button>

				<a th:href=@{/MenuTickets} title="Volver"> <svg
						xmlns="http://www.w3.org/2000/svg" width="20" height="20"
						viewBox="0 0 48 48">
						<defs>
						<mask id="IconifyId19cecfd8d3d6a39a15">
					<path fill="#555" fill-rule="evenodd" stroke="#fff"
							stroke-linejoin="round" stroke-width="4"
							d="M44 40.836q-7.34-8.96-13.036-10.168t-10.846-.365V41L4 23.545L20.118 7v10.167q9.523.075 16.192 6.833q6.668 6.758 7.69 16.836Z"
							clip-rule="evenodd" /></mask></defs>
						<path fill="#e11d48" d="M0 0h48v48H0z"
							mask="url(#IconifyId19cecfd8d3d6a39a15)" /></svg>
				</a>
			</div>
		</form>
		<div class="display-column">
			<h3>Sus productos:</h3>
			<div th:if="${!#lists.isEmpty(obj_ticket.listaTicketConProductos)}">
				<span th:each="elem : ${obj_ticket.listaTicketConProductos}"
					class="sus-prod-ticket">
					<p th:text="${elem.prod.nombre} + ' x' + ${elem.cantidad}"></p> <a
					th:href="@{/BorrarProdDeTicket(id=${elem.id})}"> <svg
							xmlns="http://www.w3.org/2000/svg" width="20" height="20"
							viewBox="0 0 24 24">
							<path fill="#dc2626"
								d="M7.616 20q-.691 0-1.153-.462T6 18.384V6H5V5h4v-.77h6V5h4v1h-1v12.385q0 .69-.462 1.153T16.384 20zm2.192-3h1V8h-1zm3.384 0h1V8h-1z" />
						</svg>
				</a>
				</span>
			</div>
		</div>
	</div>
</div>

<footer th:fragment="pie"> </footer>
