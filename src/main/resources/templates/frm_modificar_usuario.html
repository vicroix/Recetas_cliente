<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Labea</title>
<link rel="stylesheet" href="styles/styles.css">
<script src="js/hashearPass.js"></script>
</head>

<body>
	<header th:include="plantillas/plantillas.html::cabecera"></header>

	<nav th:include="plantillas/plantillas.html::menu"></nav>

	<main>
		<div class="contenedor-titulo-section">
			<div>
				<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"
					viewBox="0 0 48 48">
					<path fill="none" stroke="#ea580c" stroke-width="3"
						stroke-linecap="round" stroke-linejoin="round"
						d="m6.022 40.364l15.105-28.122a2.593 2.593 0 0 1 4.02-.893c1.182 1.119 11.295 10.63 12.618 11.873a2.387 2.387 0 0 1-.15 3.834l-28.23 16.13a2.335 2.335 0 0 1-3.363-2.822M38.62 4.5l-5.657 10.72l9.156-2.903M17.744 18.54l5.024 4.833m1.904 11.078l-3.994-4.001m-10.059 1.356l2.63 2.501" /></svg>
			</div>
			<h2>Modificar usuario</h2>
			<div>
				<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"
					viewBox="0 0 48 48">
					<path fill="none" stroke="#e11d48" stroke-width="3"
						stroke-linecap="round" stroke-linejoin="round"
						d="M32.756 12.664c-6.218 6.81-15.947 8.248-15.947 18.865c0 9.137 4.794 11.971 10.533 11.971c5.315 0 9.898-4.695 9.898-11.97c0-8.038-6.684-11.845-6.684-11.845" />
					<path fill="none" stroke="#e11d48" stroke-linecap="round"
						stroke-linejoin="round"
						d="M31.035 14.366s-2.718 2.835-7.754 2.105c-5.42-.787-8.21-6.066-12.52-2.707C12.705 6.488 15.54 4.5 20.573 4.5s8.206 5.16 9.01 7.149c-4.146 3.003-6.627-5.006-12.718-2.017" /></svg>
			</div>
		</div>
		<div id="contenedor-section">
			<section class="section-form section-datos">
				<div>
					<form th:action="@{/ModificarUsuario}" method="post"
						th:object="${obj_usuario}">
							<div class="display-column">
								<input type="hidden" th:field="*{id}" readonly>
								<label>User:</label>
								<input type="text" th:field="*{user}"
									placeholder="Ej: Patatas fritas" required>
							</div>
							<div>
								<label>Pass:</label>
								<input type="text" id="pass_sin_hash" oninput="calcularSha256();"></input>
							</div>
							<div class="display-row">
								<select th:field="*{role.id}">
									<option th:each="elem:${listaRoles}" th:value="${elem.id}" th:text="${elem.nombre}">
									</select>
							</div>
							<div class="display-row">
								<div>
								<a th:href="@{/MenuInicio}" class="a-svg-back">
									<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 8 8"><path fill="currentColor" d="M4 2h4v6H4l1-2h1V4H4v2L0 3l4-3"/ class="svg-back"></svg>
								</a>								
								</div>
								<input type="hidden" th:field="*{pass}" value="">
								<input type="submit" value="Modificar usuario">
							</div>
					</form>
				</div>
			</section>
		</div>
	</main>

	<footer th:include="plantillas/plantillas.html::pie"></footer>
</body>

</html>
