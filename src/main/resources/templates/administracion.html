<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Labea</title>
<link rel="stylesheet" href="styles/styles.css">
<script src="js/hashearPass.js"></script>
</head>

<body>
	<header th:include="plantillas/plantillas.html::cabecera"></header>

	<nav th:include="plantillas/plantillas.html::menu"></nav>

	<main>
		<div class="contenedor-titulo-section">
			<div>

					<path fill="#F59D18" d="M21.066 20.667c1.227-.682 1.068-3.31-.354-5.874c-.61-1.104-1.36-1.998-2.11-2.623a5.23 5.23 0 0 1-3.1 1.03a5.23 5.23 0 0

					1.14 5.312 2.543 5.312c.846 0 1.265-.865 1.466-2.188c.2 1.314.62 2.188 1.46 2.188c1.397 0 2.546-2.375 2.546-5.312c0-.66-.062-1.29-.168-1.873c.6.575

				</svg>
			</div>
			<h2>Administración</h2>
			<div>
				<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24">
					<path fill="#4085FF" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12c5.16-1.26 9-6.45 9-12V5Zm0
				 			3.9a3 3 0 1 1-3 3a3 3 0 0 1 3-3m0 7.9c2 0 6 1.09 6 3.08a7.2 7.2 0 0 1-12 0c0-1.99 4-3.08 6-3.08"/>
				</svg>
			</div>
		</div>
		<div id="contenedor-section-admin">
			<section class="section-form-insert">
				<div>
					<form th:action="@{/RegistrarUsuario}" method="post"
						th:object="${obj_usuario}" class="display-column">
						<div>
							<h3 class="titulo-form">Registrar usuario</h3>
						</div>
						<div>
							<div class="display-row">
								<div class="display-row-inputs">
									<div class="display-row-inputs">
										<label>Usuario:</label> <input type="text" th:field="*{user}"
											value=""></input>
									</div>
									<div class="display-row-inputs">
										<label>Contraseña:</label> <input type="password"
											id="pass_sin_hash" oninput="calcularSha256();"></input>
									</div>
									<div class="display-row-inputs">
										<select th:field="*{role.id}">
											<option th:each="elem:${listaRoles}" th:value="${elem.id}"
												th:text="${elem.nombre}">
										</select>
									</div>
								</div>
								<input type="hidden" th:field="*{pass}" value=""></input> <input
										type="submit" value="Registrar">
							</div>
					</form>
				</div>
				<div>
					<h3 th:if="${success}" th:text="${success}" style="color: green"></h3>
					<h3 th:if="${MsgError}" th:text="${MsgError}" style="color: red"></h3>
				</div>
			</section>
			<section class="section-table">
				<div class="section-datos">
					<table class="administracion">
						<thead>
							<tr>
								<th class="data-id">ID</th>
								<th>Nombre</th>
								<th>Pass</th>
								<th>Salt</th>
								<th class="data-id">R_ID</th>
								<th>ROL</th>
								<th>Gestión</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="elem:${listaUsuarios}">
								<td th:text="${elem.id}" th:title="${elem.id}"
									class="texto-recortado"></td>
								<td th:text="${elem.user}" th:title="${elem.user}"
									class="texto-recortado"></td>
								<td th:text="${elem.pass}" th:title="${elem.pass}"
									class="texto-recortado"></td>
								<td th:text="${elem.salt}" th:title="${elem.salt}"
									class="texto-recortado"></td>
								<td th:text="${elem.role.id}" th:title="${elem.role.id}"
									class="texto-recortado"></td>
								<td th:text="${elem.role.nombre}" th:title="${elem.role.nombre}"
									class="texto-recortado"></td>
								<td>
									<div>
										<a th:href="@{/ModificarUsuario(id=${elem.id})}" class="modificar">
											<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24">
												<path fill="#000000" d="M8.707 19.707L18 10.414L13.586 6l-9.293 9.293a1 1 0 0 0-.263.464L3
														21l5.242-1.03c.176-.044.337-.135.465-.263M21 7.414a2 2 0 0 0 0-2.828L19.414 3a2 2 0 0 0-2.828 0L15 4.586L19.414 9z"/>
											</svg>
										</a>
										<a th:href="@{/BorrarUsuario(id=${elem.id})}" class="borrar">
											<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24">
												<path fill="#000000" d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6z"/>
											</svg>
										</a>									
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</section>
		</div>
	</main>

	<footer th:include="plantillas/plantillas.html::pie"></footer>
</body>
