<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Labea</title>
<link rel="stylesheet" href="styles/styles.css">
<script src="js/hashearPass.js"></script>
</head>

<body>
	<header th:include="plantillas/plantillas.html::cabecera"></header>

	<nav th:include="plantillas/plantillas.html::menu"></nav>

	<main id="main-inicio">
		<section
			th:if="${'ADMIN'.equals(s_usu.role.nombre) || 'USUARIO'.equals(s_usu.role.nombre)}">
			<div>
				<form th:action="@{/InsertarReceta}" method="post"
					th:object="${obj_receta}" class="display-column">
					<div>
						<h2 class="titulo-form">Insertar receta</h2>
					</div>
					<div class="display-row">
						<div class="display-row-inputs">
							<div>
								<label>Nombre:</label> <input type="text" th:field="*{nombre}"
									placeholder="Ej: Patatas fritas" required>
							</div>
							<div>
								<label>Dificultad:</label> <select th:field="*{dificultad.id}">
									<option th:each="elem:${listaDificultades}"
										th:value="${elem.id}" th:text="${elem.dificultad}" required>
								</select>
							</div>
						</div>
						<input type="submit" value="Insertar receta">
					</div>
				</form>
			</div>
		</section>
		<section class="section-table">
			<div class="section-datos">
				<div>
					<form th:action="@{/filtrarTablaRecetas}" method="get"
						class="display-column">
						<div class="contenedor-filtro-botones">
							<div class="display-row-inputs">
								<div>
									<label>Nombre:</label> <input type="text" name="nombre">
								</div>
								<div>
									<label>Dificultad:</label> <select name="dificultad">
										<option value="">
										<option th:each="elem:${listaDificultades}"
											th:value="${elem.dificultad}" th:text="${elem.dificultad}">
									</select>
								</div>
							</div>
							<div class="display-row-buttons">
								<div>
									<button type="submit" class="button-search lupa" title="Filtrar">
										<svg xmlns="http://www.w3.org/2000/svg" width="25" height="25"
											viewBox="0 0 48 48">
									<defs>
								<mask id="IconifyId19d390c09858e69d011">
									<g fill="currentColor" stroke="#fff" stroke-linejoin="round"
												stroke-width="4">
									<path fill="#555"
												d="M21 38c9.389 0 17-7.611 17-17S30.389 4 21 4S4 11.611 4 21s7.611 17 17 17Z" />
									<path stroke-linecap="round"
												d="M26.657 14.343A7.98 7.98 0 0 0 21 12a7.98 7.98 0 0 0-5.657 2.343m17.879 18.879l8.485 8.485" /></g>
								</mask></defs>
									<path fill="currentColor" d="M0 0h48v48H0z"
												mask="url(#IconifyId19d390c09858e69d011)" />
							</svg>
									</button>
								</div>
								<div>
									<a th:href="@{/MenuInicio}" class="button-search limpiar"
										title="Limpiar"> <svg xmlns="http://www.w3.org/2000/svg"
											width="25" height="25" viewBox="0 0 48 48">
								<path fill="currentColor" fill-rule="evenodd"
												d="M21.468 19.922q-.285 1.044-.562 2.07c2.921 2.096 4.548 5.826 4.467 9.535l-.056 2.538a4.95 4.95 0 0 0 1.462 3.627l1.084 1.073c2.705 2.677 1.196 7.439-2.764 7.77c-2.83.235-6.366.464-9.477.464c-4.013 0-8.002-.38-10.476-.672c-2.458-.29-4.37-2.442-4.125-5.04c.33-3.485 1.198-7.386 2.069-10.676c1.387-5.242 5.521-9.67 11.1-10.267l.289-1.101l.003-.013c1.383-5.274 2.866-10.928 4.457-16.021c.443-1.417 1.78-2.533 3.468-2.123c.288.07.635.163.92.248c1.674.498 2.287 2.146 1.964 3.608c-1.068 4.838-2.482 10.043-3.819 14.964l-.004.013zm-11.459 14.92a2 2 0 0 1 1.769 2.207c-.122 1.106.006 3.759 1.205 5.896a68 68 0 0 0 2.9.053c-1.236-2.447-1.234-4.912-1.233-5.86v-.061a2 2 0 1 1 4 0c0 1.3.057 3.941 2.045 5.76c1.417-.081 2.808-.184 4.071-.289a.5.5 0 0 0 .28-.101a.56.56 0 0 0 .003-.839l-1.084-1.072a8.95 8.95 0 0 1-2.647-6.559l.056-2.538c.09-4.068-2.545-7.163-5.895-7.163c-3.997 0-7.38 3.038-8.522 7.358c-.85 3.21-1.655 6.866-1.953 10.028c-.03.314.187.643.61.693c.82.096 1.806.202 2.898.3c-.808-2.453-.843-4.838-.71-6.044a2 2 0 0 1 2.207-1.769m16.351-5.217a2 2 0 0 1 2-2h11.76a2 2 0 1 1 0 4H28.36a2 2 0 0 1-2-2m4.44 3.879a2 2 0 1 0 0 4h11.76a2 2 0 1 0 0-4zm2.44 5.879a2 2 0 1 0 0 4H45a2 2 0 1 0 0-4z"
												clip-rule="evenodd" /></svg>
									</a>
								</div>
							</div>
						</div>
					</form>
				</div>
				<div class="contenedor-tabla">
					<table>
						<thead>
							<tr>
								<th>ID</th>
								<th>NOMBRE</th>
								<th>Dificultad</th>
								<th th:if="${'ADMIN'.equals(s_usu.role.nombre)}">Gestión</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="elem: ${listaRecetas}">
								<td th:text="${elem.id}"></td>
								<td th:text="${elem.nombre}"></td>
								<td th:text="${elem.dificultad.dificultad}"></td>
								<td th:if="${'ADMIN'.equals(s_usu.role.nombre)}">
									<div>
										<a th:href="@{/ModificarReceta(id=${elem.id})}"> <svg
												xmlns="http://www.w3.org/2000/svg" width="15" height="15"
												viewBox="0 0 24 24">
													<path fill="currentColor"
													d="M8.707 19.707L18 10.414L13.586 6l-9.293 9.293a1 1 0 0 0-.263.464L3
													 	21l5.242-1.03c.176-.044.337-.135.465-.263M21 7.414a2 2 0 0 0 0-2.828L19.414 3a2 2 0 0 0-2.828 0L15 4.586L19.414 9z" />
												</svg>
										</a> <a th:href="@{/BorrarReceta(id=${elem.id})}" class="borrar">
											<svg xmlns="http://www.w3.org/2000/svg" width="15"
												height="15" viewBox="0 0 24 24">
												<path fill="currentColor"
													d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6z" />
											</svg>
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

			</div>

		</section>
	</main>

	<footer th:include="plantillas/plantillas.html::pie"></footer>
</body>

</html>
